name: Weekly Detection Rules Digest (Claude Code Routine)

on:
  schedule:
    # Every Sunday at 06:30 UTC (after build completes)
    - cron: '30 6 * * 0'
  workflow_dispatch:

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.3'

      - name: Install dependencies
        run: npm install

      - name: Generate weekly digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-digest.js

      - name: Commit digest if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          git diff --staged --quiet || git commit -m "chore: weekly detection rules digest $(date +%Y-%m-%d)"
          git push
